name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
      issues: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x
        
    - name: Build
      run: |
        dotnet restore src/Kafka.Connect.sln --configfile nuget.config
        dotnet build src/Kafka.Connect.sln --no-restore
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}

    - name: Run unit tests
      run: |
        dotnet restore tests/Kafka.Connect.UnitTests/Kafka.Connect.UnitTests.csproj --configfile nuget.config
        dotnet build tests/Kafka.Connect.UnitTests/Kafka.Connect.UnitTests.csproj --no-restore
        dotnet test tests/Kafka.Connect.UnitTests/Kafka.Connect.UnitTests.csproj --no-build --verbosity normal --logger "trx;LogFileName=unit-tests.trx" --results-directory TestResults
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}

    - name: Run integration tests
      run: |
        dotnet restore tests/Kafka.Connect.Tests/Kafka.Connect.Tests.csproj --configfile nuget.config
        dotnet build tests/Kafka.Connect.Tests/Kafka.Connect.Tests.csproj --no-restore
        dotnet test tests/Kafka.Connect.Tests/Kafka.Connect.Tests.csproj --no-build --verbosity normal --logger "trx;LogFileName=integration-tests.trx" --results-directory TestResults
      env:
        DOCKER_HOST: unix:///var/run/docker.sock
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}
        
    - name: Publish test report (upload results)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: TestResults/**/*.trx

    - name: Publish test report (checks)
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: .NET Test Results
        path: TestResults/**/*.trx
        reporter: dotnet-trx

    - name: Publish test report (PR status comment)
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      env:
        JOB_STATUS: ${{ job.status }}
      with:
        script: |
          const status = process.env.JOB_STATUS || 'unknown';
          const icon = status === 'success' ? '✅' : (status === 'failure' ? '❌' : '⚠️');
          const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const body = [
            `### ${icon} CI Test Status: ${status.toUpperCase()}`,
            '',
            `- Unit and integration tests were executed.`,
            `- Test reports are attached as artifacts and published to Checks.`,
            `- Workflow run: ${runUrl}`
          ].join('\n');

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body
          });

    - name: Publish test report (main summary)
      if: always() && github.ref == 'refs/heads/main'
      run: |
        echo "## CI Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "- Job status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "- Unit + integration tests executed" >> $GITHUB_STEP_SUMMARY
        echo "- Detailed results are available in the Checks tab and uploaded artifacts" >> $GITHUB_STEP_SUMMARY

  build-and-push-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    
    permissions:
      contents: read
      packages: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
        
    - name: Determine version
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION="1.0.0.${GITHUB_RUN_NUMBER}"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"
        
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}
          type=raw,value=${{ steps.version.outputs.VERSION }}
          
    - name: Build and push Docker image (with NuGet publishing)
      uses: docker/build-push-action@v5
      with:
        context: .
        target: release
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          BUILD_VERSION=${{ steps.version.outputs.VERSION }}
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME=${{ github.actor }}