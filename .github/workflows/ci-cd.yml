name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      unit_total: ${{ steps.test_counts.outputs.unit_total }}
      unit_passed: ${{ steps.test_counts.outputs.unit_passed }}
      unit_failed: ${{ steps.test_counts.outputs.unit_failed }}
      unit_skipped: ${{ steps.test_counts.outputs.unit_skipped }}
      integration_total: ${{ steps.test_counts.outputs.integration_total }}
      integration_passed: ${{ steps.test_counts.outputs.integration_passed }}
      integration_failed: ${{ steps.test_counts.outputs.integration_failed }}
      integration_skipped: ${{ steps.test_counts.outputs.integration_skipped }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
      issues: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x
        
    - name: Build
      run: |
        dotnet restore src/Kafka.Connect.sln --configfile nuget.config
        dotnet build src/Kafka.Connect.sln --no-restore
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}

    - name: Run unit tests
      id: unit_tests
      run: |
        dotnet restore tests/Kafka.Connect.UnitTests/Kafka.Connect.UnitTests.csproj --configfile nuget.config
        dotnet build tests/Kafka.Connect.UnitTests/Kafka.Connect.UnitTests.csproj --no-restore
        dotnet test tests/Kafka.Connect.UnitTests/Kafka.Connect.UnitTests.csproj --no-build --verbosity normal --logger "trx;LogFileName=unit-tests.trx" --results-directory TestResults
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}

    - name: Run integration tests
      id: integration_tests
      run: |
        dotnet restore tests/Kafka.Connect.Tests/Kafka.Connect.Tests.csproj --configfile nuget.config
        dotnet build tests/Kafka.Connect.Tests/Kafka.Connect.Tests.csproj --no-restore
        dotnet test tests/Kafka.Connect.Tests/Kafka.Connect.Tests.csproj --no-build --verbosity normal --logger "trx;LogFileName=integration-tests.trx" --results-directory TestResults
      env:
        DOCKER_HOST: unix:///var/run/docker.sock
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}
        
    - name: Publish test report (upload results)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: TestResults/**/*.trx

    - name: Publish test report (checks)
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: test-results
        path: TestResults/**/*.trx
        reporter: dotnet-trx

    - name: Publish test report (PR status comment)
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      env:
        JOB_STATUS: ${{ job.status }}
      with:
        script: |
          const status = process.env.JOB_STATUS || 'unknown';
          const icon = status === 'success' ? '✅' : (status === 'failure' ? '❌' : '⚠️');
          const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const body = [
            `### ${icon} CI Test Status: ${status.toUpperCase()}`,
            '',
            `- Unit and integration tests were executed.`,
            `- Test reports are attached as artifacts and published to Checks.`,
            `- Workflow run: ${runUrl}`
          ].join('\n');

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body
          });

    - name: Collect test counts
      if: always()
      id: test_counts
      run: |
        python3 - <<'PY'
        import glob
        import os
        import xml.etree.ElementTree as ET

        def parse_trx(filename):
            files = sorted(glob.glob(f"TestResults/**/{filename}", recursive=True))
            if not files:
                return {
                    "total": 0,
                    "passed": 0,
                    "failed": 0,
                    "skipped": 0,
                }

            root = ET.parse(files[-1]).getroot()
            counters = root.find('.//{*}Counters')
            if counters is None:
                return {
                    "total": 0,
                    "passed": 0,
                    "failed": 0,
                    "skipped": 0,
                }

            total = int(counters.attrib.get('total', '0'))
            passed = int(counters.attrib.get('passed', '0'))
            failed = int(counters.attrib.get('failed', '0'))
            not_executed = int(counters.attrib.get('notExecuted', '0'))
            inconclusive = int(counters.attrib.get('inconclusive', '0'))
            skipped = not_executed + inconclusive

            return {
                "total": total,
                "passed": passed,
                "failed": failed,
                "skipped": skipped,
            }

        unit = parse_trx('unit-tests.trx')
        integration = parse_trx('integration-tests.trx')

        with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
            out.write(f"unit_total={unit['total']}\n")
            out.write(f"unit_passed={unit['passed']}\n")
            out.write(f"unit_failed={unit['failed']}\n")
            out.write(f"unit_skipped={unit['skipped']}\n")

            out.write(f"integration_total={integration['total']}\n")
            out.write(f"integration_passed={integration['passed']}\n")
            out.write(f"integration_failed={integration['failed']}\n")
            out.write(f"integration_skipped={integration['skipped']}\n")
        PY



  build-and-push-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    
    permissions:
      contents: read
      packages: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
        
    - name: Determine version
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION="1.0.0.${GITHUB_RUN_NUMBER}"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"
        
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}
          type=raw,value=${{ steps.version.outputs.VERSION }}
          
    - name: Build and push Docker image (with NuGet publishing)
      id: docker_build
      uses: docker/build-push-action@v5
      with:
        context: .
        target: release
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          BUILD_VERSION=${{ steps.version.outputs.VERSION }}
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME=${{ github.actor }}

    - name: Build Summary
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        GITHUB_PACKAGES_URL="https://nuget.pkg.github.com/${{ github.repository_owner }}/query?q=version:$VERSION"
        
        echo "# Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Build**: \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Unit Tests Drill-down
        echo "<details>" >> $GITHUB_STEP_SUMMARY
        echo "<summary>🧪 Unit Tests: ${{ needs.build-and-test.outputs.unit_passed }} passed</summary>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Total | ${{ needs.build-and-test.outputs.unit_total }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Passed | ${{ needs.build-and-test.outputs.unit_passed }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Failed | ${{ needs.build-and-test.outputs.unit_failed }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Skipped | ${{ needs.build-and-test.outputs.unit_skipped }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "</details>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Integration Tests Drill-down
        echo "<details>" >> $GITHUB_STEP_SUMMARY
        echo "<summary>🧪 Integration Tests: ${{ needs.build-and-test.outputs.integration_passed }} passed</summary>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Total | ${{ needs.build-and-test.outputs.integration_total }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Passed | ${{ needs.build-and-test.outputs.integration_passed }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Failed | ${{ needs.build-and-test.outputs.integration_failed }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Skipped | ${{ needs.build-and-test.outputs.integration_skipped }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "</details>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Artifacts Drill-down
        echo "<details>" >> $GITHUB_STEP_SUMMARY
        echo "<summary>📦 Artifacts</summary>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Extract docker image name (first tag contains the image reference)
        DOCKER_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
        if [ -n "$DOCKER_TAG" ]; then
          echo "🐳 **docker**: \`$DOCKER_TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi
        
        # Query and list NuGet packages published with this version
        echo "📦 **nuget**:" >> $GITHUB_STEP_SUMMARY
        
        # Search the GitHub Packages feed using curl with auth
        PACKAGES=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://nuget.pkg.github.com/${{ github.repository_owner }}/query?q=version:$VERSION" 2>/dev/null | \
          grep -oP '(?<=<id>)[^<]+(?=</id>)' | sort -u || true)
        
        while IFS= read -r package; do
          if [ -n "$package" ]; then
            echo "- \`$package:$VERSION\`" >> $GITHUB_STEP_SUMMARY
          fi
        done <<< "$PACKAGES"
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "</details>" >> $GITHUB_STEP_SUMMARY