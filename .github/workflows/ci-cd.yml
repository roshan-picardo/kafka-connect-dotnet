name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      unit_total: ${{ steps.test_counts.outputs.unit_total }}
      unit_passed: ${{ steps.test_counts.outputs.unit_passed }}
      unit_failed: ${{ steps.test_counts.outputs.unit_failed }}
      unit_skipped: ${{ steps.test_counts.outputs.unit_skipped }}
      unit_elapsed: ${{ steps.test_counts.outputs.unit_elapsed }}
      integration_total: ${{ steps.test_counts.outputs.integration_total }}
      integration_passed: ${{ steps.test_counts.outputs.integration_passed }}
      integration_failed: ${{ steps.test_counts.outputs.integration_failed }}
      integration_skipped: ${{ steps.test_counts.outputs.integration_skipped }}
      integration_elapsed: ${{ steps.test_counts.outputs.integration_elapsed }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
      issues: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x
        
    - name: Build
      run: |
        dotnet restore src/Kafka.Connect.sln --configfile nuget.config
        dotnet build src/Kafka.Connect.sln --no-restore
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}

    - name: Run unit tests
      id: unit_tests
      run: |
        dotnet restore tests/Kafka.Connect.UnitTests/Kafka.Connect.UnitTests.csproj --configfile nuget.config
        dotnet build tests/Kafka.Connect.UnitTests/Kafka.Connect.UnitTests.csproj --no-restore
        dotnet test tests/Kafka.Connect.UnitTests/Kafka.Connect.UnitTests.csproj --no-build --verbosity normal --logger "trx;LogFileName=unit-tests.trx" --results-directory TestResults
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}

    - name: Run integration tests
      id: integration_tests
      run: |
        dotnet restore tests/Kafka.Connect.Tests/Kafka.Connect.Tests.csproj --configfile nuget.config
        dotnet build tests/Kafka.Connect.Tests/Kafka.Connect.Tests.csproj --no-restore
        dotnet test tests/Kafka.Connect.Tests/Kafka.Connect.Tests.csproj --no-build --verbosity normal --logger "trx;LogFileName=integration-tests.trx" --results-directory TestResults
      env:
        DOCKER_HOST: unix:///var/run/docker.sock
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}
        
    - name: Publish test report (upload results)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: TestResults/**/*.trx

    - name: Publish test report (checks)
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: test-results
        path: TestResults/**/*.trx
        reporter: dotnet-trx

    - name: Publish test report (PR status comment)
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      env:
        JOB_STATUS: ${{ job.status }}
      with:
        script: |
          const status = process.env.JOB_STATUS || 'unknown';
          const icon = status === 'success' ? '✅' : (status === 'failure' ? '❌' : '⚠️');
          const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const body = [
            `### ${icon} CI Test Status: ${status.toUpperCase()}`,
            '',
            `- Unit and integration tests were executed.`,
            `- Test reports are attached as artifacts and published to Checks.`,
            `- Workflow run: ${runUrl}`
          ].join('\n');

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body
          });

    - name: Collect test counts
      if: always()
      id: test_counts
      run: |
        python3 - <<'PY'
        import glob
        import os
        from datetime import datetime
        import xml.etree.ElementTree as ET

        def parse_utc(value):
            if not value:
                return None
            # TRX timestamps are usually ISO 8601 and may end with Z.
            normalized = value.replace('Z', '+00:00')
            try:
                return datetime.fromisoformat(normalized)
            except ValueError:
                return None

        def parse_trx(filename):
            files = sorted(glob.glob(f"TestResults/**/{filename}", recursive=True))
            if not files:
                return {
                    "total": 0,
                    "passed": 0,
                    "failed": 0,
                    "skipped": 0,
                    "elapsed": "0s",
                }

            root = ET.parse(files[-1]).getroot()
            counters = root.find('.//{*}Counters')
            if counters is None:
                return {
                    "total": 0,
                    "passed": 0,
                    "failed": 0,
                    "skipped": 0,
                    "elapsed": "0s",
                }

            total = int(counters.attrib.get('total', '0'))
            passed = int(counters.attrib.get('passed', '0'))
            failed = int(counters.attrib.get('failed', '0'))
            not_executed = int(counters.attrib.get('notExecuted', '0'))
            inconclusive = int(counters.attrib.get('inconclusive', '0'))
            skipped = not_executed + inconclusive
            times = root.find('.//{*}Times')
            elapsed = '0s'
            if times is not None:
                start_dt = parse_utc(times.attrib.get('start'))
                finish_dt = parse_utc(times.attrib.get('finish'))
                if start_dt is not None and finish_dt is not None:
                    seconds = max(0, int((finish_dt - start_dt).total_seconds()))
                    elapsed = f'{seconds}s'

            return {
                "total": total,
                "passed": passed,
                "failed": failed,
                "skipped": skipped,
                "elapsed": elapsed,
            }

        unit = parse_trx('unit-tests.trx')
        integration = parse_trx('integration-tests.trx')

        with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
            out.write(f"unit_total={unit['total']}\n")
            out.write(f"unit_passed={unit['passed']}\n")
            out.write(f"unit_failed={unit['failed']}\n")
            out.write(f"unit_skipped={unit['skipped']}\n")
            out.write(f"unit_elapsed={unit['elapsed']}\n")

            out.write(f"integration_total={integration['total']}\n")
            out.write(f"integration_passed={integration['passed']}\n")
            out.write(f"integration_failed={integration['failed']}\n")
            out.write(f"integration_skipped={integration['skipped']}\n")
            out.write(f"integration_elapsed={integration['elapsed']}\n")
        PY



  build-and-push-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      docker_tag: ${{ steps.primary_tag.outputs.value }}
      docker_tags: ${{ steps.meta.outputs.tags }}
    
    permissions:
      contents: read
      packages: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
        
    - name: Determine version
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION="1.0.0.${GITHUB_RUN_NUMBER}"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"
        
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}
          type=raw,value=${{ steps.version.outputs.VERSION }}

    - name: Capture primary docker tag
      id: primary_tag
      run: |
        PRIMARY_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
        echo "value=$PRIMARY_TAG" >> $GITHUB_OUTPUT
          
    - name: Build and push Docker image (with NuGet publishing)
      id: docker_build
      uses: docker/build-push-action@v5
      with:
        context: .
        target: release
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          BUILD_VERSION=${{ steps.version.outputs.VERSION }}
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME=${{ github.actor }}


  build-summary:
    needs: [build-and-test, build-and-push-docker]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Summary
      run: |
        VERSION="${{ needs.build-and-push-docker.outputs.version }}"
        DOCKER_TAG="${{ needs.build-and-push-docker.outputs.docker_tag }}"
        DOCKER_TAGS="${{ needs.build-and-push-docker.outputs.docker_tags }}"

        normalize_count() {
          local value="$1"
          if [ "$value" = "0" ] || [ -z "$value" ]; then
            echo "-"
          else
            echo "$value"
          fi
        }

        UNIT_PASSED_DISPLAY=$(normalize_count "${{ needs.build-and-test.outputs.unit_passed }}")
        UNIT_FAILED_DISPLAY=$(normalize_count "${{ needs.build-and-test.outputs.unit_failed }}")
        UNIT_SKIPPED_DISPLAY=$(normalize_count "${{ needs.build-and-test.outputs.unit_skipped }}")
        UNIT_TOTAL_DISPLAY=$(normalize_count "${{ needs.build-and-test.outputs.unit_total }}")

        INTEGRATION_PASSED_DISPLAY=$(normalize_count "${{ needs.build-and-test.outputs.integration_passed }}")
        INTEGRATION_FAILED_DISPLAY=$(normalize_count "${{ needs.build-and-test.outputs.integration_failed }}")
        INTEGRATION_SKIPPED_DISPLAY=$(normalize_count "${{ needs.build-and-test.outputs.integration_skipped }}")
        INTEGRATION_TOTAL_DISPLAY=$(normalize_count "${{ needs.build-and-test.outputs.integration_total }}")

        echo "# Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Build**: \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Unit Tests Drill-down
        echo "<details>" >> $GITHUB_STEP_SUMMARY
        echo "<summary>🧪 Unit Tests: ${{ needs.build-and-test.outputs.unit_passed }} passed</summary>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| ✓ Passed | ✘ Failed | ↷ Skipped | ∑ Total | ⧗ Elapsed |" >> $GITHUB_STEP_SUMMARY
        echo "|---:|---:|---:|---:|---:|" >> $GITHUB_STEP_SUMMARY
        echo "| $UNIT_PASSED_DISPLAY | $UNIT_FAILED_DISPLAY | $UNIT_SKIPPED_DISPLAY | $UNIT_TOTAL_DISPLAY | ${{ needs.build-and-test.outputs.unit_elapsed }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "</details>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Integration Tests Drill-down
        echo "<details>" >> $GITHUB_STEP_SUMMARY
        echo "<summary>🧪 Integration Tests: ${{ needs.build-and-test.outputs.integration_passed }} passed</summary>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| ✓ Passed | ✘ Failed | ↷ Skipped | ∑ Total | ⧗ Elapsed |" >> $GITHUB_STEP_SUMMARY
        echo "|---:|---:|---:|---:|---:|" >> $GITHUB_STEP_SUMMARY
        echo "| $INTEGRATION_PASSED_DISPLAY | $INTEGRATION_FAILED_DISPLAY | $INTEGRATION_SKIPPED_DISPLAY | $INTEGRATION_TOTAL_DISPLAY | ${{ needs.build-and-test.outputs.integration_elapsed }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "</details>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Artifacts Drill-down
        echo "<details>" >> $GITHUB_STEP_SUMMARY
        echo "<summary>📦 Artifacts</summary>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "🐳 **docker**:" >> $GITHUB_STEP_SUMMARY
        while IFS= read -r tag; do
          if [ -n "$tag" ]; then
            echo "- \`$tag\`" >> $GITHUB_STEP_SUMMARY
          fi
        done <<< "$DOCKER_TAGS"

        if [ -z "$DOCKER_TAGS" ] && [ -n "$DOCKER_TAG" ]; then
          echo "- \`$DOCKER_TAG\`" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📦 **nuget**:" >> $GITHUB_STEP_SUMMARY
        echo "- source: https://nuget.pkg.github.com/${{ github.actor }}/index.json" >> $GITHUB_STEP_SUMMARY

        PROJECTS_FILE=$(mktemp)
        echo "src/Kafka.Connect.Plugin/Kafka.Connect.Plugin.csproj" > "$PROJECTS_FILE"
        find src/Plugins -mindepth 2 -maxdepth 2 -name '*.csproj' | sort >> "$PROJECTS_FILE"

        while IFS= read -r project; do
          if [ -z "$project" ] || [ ! -f "$project" ]; then
            continue
          fi

          PACKAGE_ID=$(grep -m1 -oP '(?<=<PackageId>).*?(?=</PackageId>)' "$project" || true)
          if [ -z "$PACKAGE_ID" ]; then
            PACKAGE_ID=$(basename "$project" .csproj)
          fi
          echo "- \`$PACKAGE_ID:$VERSION\`" >> $GITHUB_STEP_SUMMARY
        done < "$PROJECTS_FILE"

        rm -f "$PROJECTS_FILE"

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "</details>" >> $GITHUB_STEP_SUMMARY